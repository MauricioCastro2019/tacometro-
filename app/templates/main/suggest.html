{% extends 'base.html' %}
{% block title %}Sugerir taquería · Tacómetro{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="text-center mb-8">
    <p class="text-5xl mb-3">🌮</p>
    <h1 class="text-2xl font-bold text-white">¿Conoces una taquería que falta?</h1>
    <p class="text-gray-500 text-sm mt-2">
      Cuéntanos cuál es y el equipo la agrega al mapa.
    </p>
  </div>

  <div class="bg-dark-700 border border-white/5 rounded-2xl p-6">
    <form method="POST" class="space-y-5" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label class="block text-sm font-medium text-gray-400 mb-1.5">
          Nombre de la taquería <span class="text-orange-500">*</span>
        </label>
        <input type="text" name="name" required maxlength="128"
               class="w-full bg-dark-600 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-orange-500 transition"
               placeholder="Ej. Tacos El Güero">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-400 mb-1.5">
          Dirección o zona <span class="text-gray-600 font-normal">(opcional pero ayuda mucho)</span>
        </label>
        <input type="text" name="address" maxlength="256"
               class="w-full bg-dark-600 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-orange-500 transition"
               placeholder="Ej. Blvd. Torres Landa 1234, Col. Centro">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-400 mb-1.5">
          ¿Qué los hace especiales? <span class="text-gray-600 font-normal">(opcional)</span>
        </label>
        <textarea name="notes" maxlength="500" rows="3"
                  class="w-full bg-dark-600 border border-white/10 rounded-xl px-4 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:ring-2 focus:ring-orange-500 transition resize-none"
                  placeholder="Tipo de taco, horario, precio aproximado…"></textarea>
      </div>

      <button type="submit"
              class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-orange-500/20">
        Enviar sugerencia
      </button>
    </form>
  </div>

  <p class="text-center text-xs text-gray-700 mt-4">
    Las sugerencias son revisadas por el equipo antes de publicarse.
  </p>
</div>
{% endblock %}
